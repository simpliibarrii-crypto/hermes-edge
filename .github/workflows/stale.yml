name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been marked stale due to inactivity. Please update if this is still relevant."
          stale-pr-message: "This PR has been marked stale due to inactivity. Please update or it will be closed."
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
