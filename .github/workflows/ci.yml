name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - name: Public release scan
        run: python scripts/public_release_check.py
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch sentencepiece pytest ruff mypy bandit
          pip install -e ".[dev]"
      - name: Changed-code lint
        run: |
          ruff check \
            hermes/workflow_benchmark.py \
            scripts/workflow_benchmark.py \
            scripts/public_release_check.py \
            tests/test_workflow_benchmark.py \
            tests/test_public_release_check.py \
            --ignore=E501
      - name: Full-repository lint report
        id: full-lint
        run: |
          set -o pipefail
          ruff check hermes/ scripts/ --ignore=E501 2>&1 | tee inherited_ruff_findings.txt
        continue-on-error: true
      - name: Upload inherited lint findings
        if: steps.full-lint.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: inherited-ruff-findings-${{ matrix.python-version }}
          path: inherited_ruff_findings.txt
      - name: Compile Python
        run: python -m compileall -q hermes scripts tests
      - name: Type check advisory
        run: mypy hermes/ --ignore-missing-imports
        continue-on-error: true
      - name: Tests
        id: tests
        run: |
          set -o pipefail
          python -m pytest tests/ -v 2>&1 | tee pytest_findings.txt
        continue-on-error: true
      - name: Upload pytest findings
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pytest-findings-${{ matrix.python-version }}
          path: pytest_findings.txt
      - name: Enforce tests
        if: steps.tests.outcome == 'failure'
        run: exit 1

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          show-progress: false
      - name: Public release scan
        run: python scripts/public_release_check.py
      - name: Full-history Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --redact \
            --verbose
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Changed-code Bandit gate
        run: |
          bandit \
            hermes/workflow_benchmark.py \
            scripts/workflow_benchmark.py \
            scripts/public_release_check.py \
            -ll -c pyproject.toml
      - name: Full-repository Bandit report
        id: full-bandit
        run: |
          set -o pipefail
          bandit -r hermes/ -ll -c pyproject.toml 2>&1 | tee inherited_bandit_findings.txt
        continue-on-error: true
      - name: Upload inherited Bandit findings
        if: steps.full-bandit.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: inherited-bandit-findings
          path: inherited_bandit_findings.txt
      - name: Dependency audit report
        id: dependency-audit
        run: |
          set -o pipefail
          pip-audit -r requirements.txt --progress-spinner=off 2>&1 | tee inherited_dependency_findings.txt
        continue-on-error: true
      - name: Upload inherited dependency findings
        if: steps.dependency-audit.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: inherited-dependency-findings
          path: inherited_dependency_findings.txt

  node:
    name: JS skills syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Check skill files
        run: |
          for f in skills/*/SKILL.md; do
            echo "✓ $f"
          done

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          show-progress: false
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
