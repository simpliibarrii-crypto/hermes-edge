name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch sentencepiece pytest ruff mypy bandit
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check hermes/ scripts/ --ignore=E501
      - name: Type check
        run: mypy hermes/ --ignore-missing-imports || true
      - name: Tests
        run: pytest tests/ -v

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -e ".[dev]"
      - name: Bandit SAST
        run: bandit -r hermes/ -ll -c pyproject.toml || true
      - name: pip-audit
        run: pip-audit || true

  node:
    name: JS skills syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check skill files
        run: |
          for f in skills/*/SKILL.md; do
            echo "✓ $f"
          done

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
