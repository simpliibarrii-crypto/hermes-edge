name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Public release scan
        id: public-release-scan
        run: python scripts/public_release_check.py 2>&1 | tee release_scan_findings.txt
        continue-on-error: true
      - name: Upload release scan findings
        if: steps.public-release-scan.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: release-scan-findings-${{ matrix.python-version }}
          path: release_scan_findings.txt
      - name: Enforce public release scan
        if: steps.public-release-scan.outcome == 'failure'
        run: exit 1
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch sentencepiece pytest ruff mypy bandit
          pip install -e ".[dev]"
      - name: Lint
        id: lint
        run: ruff check hermes/ scripts/ --ignore=E501 2>&1 | tee ruff_findings.txt
        continue-on-error: true
      - name: Upload lint findings
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: ruff-findings-${{ matrix.python-version }}
          path: ruff_findings.txt
      - name: Enforce lint
        if: steps.lint.outcome == 'failure'
        run: exit 1
      - name: Compile Python
        run: python -m compileall -q hermes scripts tests
      - name: Type check advisory
        run: mypy hermes/ --ignore-missing-imports
        continue-on-error: true
      - name: Tests
        id: tests
        run: pytest tests/ -v 2>&1 | tee pytest_findings.txt
        continue-on-error: true
      - name: Upload test findings
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pytest-findings-${{ matrix.python-version }}
          path: pytest_findings.txt
      - name: Enforce tests
        if: steps.tests.outcome == 'failure'
        run: exit 1

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          show-progress: false
      - name: Public release scan
        id: security-public-release-scan
        run: python scripts/public_release_check.py 2>&1 | tee security_release_scan_findings.txt
        continue-on-error: true
      - name: Upload security release scan findings
        if: steps.security-public-release-scan.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: security-release-scan-findings
          path: security_release_scan_findings.txt
      - name: Enforce security release scan
        if: steps.security-public-release-scan.outcome == 'failure'
        run: exit 1
      - name: Full-history Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --redact \
            --verbose
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit SAST
        id: bandit
        run: bandit -r hermes/ -ll -c pyproject.toml 2>&1 | tee bandit_findings.txt
        continue-on-error: true
      - name: Upload Bandit findings
        if: steps.bandit.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: bandit-findings
          path: bandit_findings.txt
      - name: Enforce Bandit
        if: steps.bandit.outcome == 'failure'
        run: exit 1
      - name: Dependency audit
        run: pip-audit -r requirements.txt --progress-spinner=off

  node:
    name: JS skills syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Check skill files
        run: |
          for f in skills/*/SKILL.md; do
            echo "✓ $f"
          done

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          show-progress: false
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
