name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Public release scan
        run: python scripts/public_release_check.py
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch sentencepiece pytest ruff mypy bandit
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check hermes/ scripts/ --ignore=E501
      - name: Compile Python
        run: python -m compileall -q hermes scripts tests
      - name: Type check advisory
        run: mypy hermes/ --ignore-missing-imports
        continue-on-error: true
      - name: Tests
        run: pytest tests/ -v

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          show-progress: false
      - name: Public release scan
        run: python scripts/public_release_check.py
      - name: Full-history Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --redact \
            --verbose
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit SAST
        run: bandit -r hermes/ -ll -c pyproject.toml
      - name: Dependency audit
        run: pip-audit -r requirements.txt --progress-spinner=off

  node:
    name: JS skills syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Check skill files
        run: |
          for f in skills/*/SKILL.md; do
            echo "✓ $f"
          done

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          show-progress: false
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
